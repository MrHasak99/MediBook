<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Doctors — MediBook</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="navbar"></div>

  <main class="page-wrapper">
    <div class="container">
      <div class="dashboard-header">
        <h1>Find a Doctor</h1>
        <p class="text-gray">Search and filter by specialty to find the right specialist.</p>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="form-group search">
          <label class="form-label">Search by name</label>
          <input type="text" id="search" class="form-input" placeholder="Dr. Smith…" />
        </div>
        <div class="form-group">
          <label class="form-label">Specialty</label>
          <select id="specialty-filter" class="form-select">
            <option value="">All Specialties</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Sort by experience</label>
          <select id="sort" class="form-select">
            <option value="desc">Most experienced</option>
            <option value="asc">Least experienced</option>
          </select>
        </div>
        <button class="btn btn-primary btn-md" id="search-btn" style="align-self:flex-end;">Search</button>
      </div>

      <!-- Results -->
      <div id="results-count" class="text-sm text-gray mb-4"></div>
      <div class="grid grid-3" id="doctors-grid">
        <div class="skeleton" style="height:200px;border-radius:.75rem;"></div>
        <div class="skeleton" style="height:200px;border-radius:.75rem;"></div>
        <div class="skeleton" style="height:200px;border-radius:.75rem;"></div>
      </div>
    </div>
  </main>

  <footer><p>© 2025 MediBook</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script>
    // Redirect doctors and admins away from this patient-facing page
    (async () => {
      const session = await getSession();
      if (session) {
        const profile = await getProfile(session.user.id);
        if (profile && profile.role === 'DOCTOR') {
          window.location.href = '/dashboard/doctor';
          return;
        }
        if (profile && profile.role === 'ADMIN') {
          window.location.href = '/dashboard/admin';
          return;
        }
      }
      renderNavbar('doctors');
      loadSpecialties().then(loadDoctors);
    })();

    const searchInput  = document.getElementById('search');
    const specialtyFilter = document.getElementById('specialty-filter');
    const sortInput    = document.getElementById('sort');
    const searchBtn    = document.getElementById('search-btn');
    const grid         = document.getElementById('doctors-grid');
    const resultsCount = document.getElementById('results-count');

    // Pre-fill specialty filter from URL param (e.g. from AI assistant)
    const urlParams = new URLSearchParams(window.location.search);
    const urlSpecialtyId = urlParams.get('specialty_id');
    if (urlSpecialtyId && urlSpecialtyId !== 'undefined' && urlSpecialtyId !== 'null') {
      specialtyFilter.value = urlSpecialtyId;
    }

    async function loadSpecialties() {
      try {
        const res = await api.getSpecialties();
        (res.data || []).forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.name;
          specialtyFilter.appendChild(opt);
        });
        // Apply URL param after populating options
        if (urlSpecialtyId && urlSpecialtyId !== 'undefined' && urlSpecialtyId !== 'null') {
          specialtyFilter.value = urlSpecialtyId;
        }
      } catch {}
    }

    async function loadDoctors() {
      grid.innerHTML = `
        <div class="skeleton" style="height:200px;border-radius:.75rem;"></div>
        <div class="skeleton" style="height:200px;border-radius:.75rem;"></div>
        <div class="skeleton" style="height:200px;border-radius:.75rem;"></div>`;
      resultsCount.textContent = '';

      try {
        const res = await api.getDoctors({
          search: searchInput.value.trim(),
          specialty_id: specialtyFilter.value,
          sort: sortInput.value,
        });
        const doctors = res.data || [];
        resultsCount.textContent = `${doctors.length} doctor${doctors.length !== 1 ? 's' : ''} found`;

        if (doctors.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1;">
              <p>No doctors found matching your search.</p>
            </div>`;
          return;
        }

        grid.innerHTML = doctors.map(d => `
          <div class="card" style="display:flex;flex-direction:column;">
            <div class="card-body" style="flex:1;">
              <div class="flex gap-3 items-center">
                <div class="doctor-avatar" style="width:52px;height:52px;flex-shrink:0;">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                </div>
                <div>
                  <div style="font-weight:600;font-size:.9375rem;">Dr. ${d.profiles?.name || ''}</div>
                  <span class="badge badge-info mt-1">${d.specialties?.name || 'General'}</span>
                </div>
              </div>
              ${d.bio ? `<p class="text-sm text-gray mt-2" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${d.bio}</p>` : ''}
              ${d.experience_years ? `<p class="text-sm text-gray mt-2">🏥 ${d.experience_years} years experience</p>` : ''}
            </div>
            <div class="card-footer">
              <a href="/doctor?id=${d.id}" class="btn btn-primary btn-sm btn-full">View &amp; Book</a>
            </div>
          </div>
        `).join('');
      } catch (e) {
        grid.innerHTML = `<p class="text-gray text-sm" style="grid-column:1/-1;">Failed to load doctors. Please try again.</p>`;
      }
    }

    searchBtn.addEventListener('click', loadDoctors);
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadDoctors(); });
    specialtyFilter.addEventListener('change', loadDoctors);
    sortInput.addEventListener('change', loadDoctors);
  </script>
</body>
</html>
